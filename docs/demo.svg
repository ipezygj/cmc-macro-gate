  <g xml:space="preserve">
    <text x="18" y="62"><tspan fill="#27c93f">$ </tspan><tspan fill="#c9d1d9">export CMC_MCP_API_KEY=</tspan><tspan fill="#6e7681">••••••••</tspan></text>

