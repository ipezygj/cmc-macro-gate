    <text x="34" y="200"><tspan fill="#79c0ff">"regime"</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#a5d6ff">"headwind_tightening"</tspan><tspan fill="#c9d1d9">,</tspan></text>
    <text x="34" y="220"><tspan fill="#79c0ff">"fear_greed"</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#ffa657">18</tspan><tspan fill="#c9d1d9">,</tspan></text>
    <text x="34" y="240"><tspan fill="#79c0ff">"size_mult"</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#ffa657">0.24</tspan><tspan fill="#c9d1d9">,</tspan></text>
    <text x="34" y="260"><tspan fill="#79c0ff">"action"</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#ff7b72">"REDUCE"</tspan><tspan fill="#c9d1d9">,</tspan></text>
    <text x="34" y="280"><tspan fill="#79c0ff">"stale"</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#79c0ff">false</tspan><tspan fill="#c9d1d9">,</tspan></text>
    <text x="34" y="300"><tspan fill="#79c0ff">"note"</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#a5d6ff">"regime=headwind_tightening | extreme_fear(18) | …"</tspan></text>
